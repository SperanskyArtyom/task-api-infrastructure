replicaCount: 3

image:
  repository: ghcr.io/your-username/task-api
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "traefik-dev"
  host: "task-api.local"
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "false"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

env:
  FLASK_ENV: "production"
